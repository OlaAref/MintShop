<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
	<link rel="stylesheet" type="text/css" th:href="@{/css/profile-dropdown.css}">
</head>

<body >

	<div th:fragment="profile-dropdown">
	
		<ul class="navbar-nav ml-auto">
		
			<div sec:authorize="isAuthenticated()">

				<li class="nav-item dropdown">
					<a class="dropdown-toggle btn btn-primary" href="#" id="navbarDropdown" role="button" data-toggle="dropdown"
						aria-haspopup="true" aria-expanded="false">
						<div class="img-title-div">
							<img th:src="@{/img/instruct/user.png}" class="img-title" />
						</div>

						<div class="username-title">
							<h5>
								<span sec:authentication="name"></span>
							</h5>
							<span sec:authorize="hasRole('ROLE_STUDENT')">Student</span>
							<span sec:authorize="hasRole('ROLE_INSTRUCTOR')">Instructor</span>
							<span sec:authorize="hasRole('ROLE_ADMIN')">Admin</span>
							
						</div>
					</a>
					<div class="dropdown-menu" aria-labelledby="navbarDropdown">
						<div sec:authorize="hasRole('ROLE_STUDENT')">
							<a class="dropdown-item" th:href="@{'/profile/studentProfile?userName=' + ${#authentication.name}}">
								<i class="far fa-user-circle" style="vertical-align: middle;"></i>
								My Profile
							</a>
						</div>
						<div sec:authorize="hasRole('ROLE_INSTRUCTOR')">
							<a class="dropdown-item" th:href="@{'/profile/instructorProfile?userName=' + ${#authentication.name}}">
								<i class="far fa-user-circle" style="vertical-align: middle;"></i>
								My Profile
							</a>
						</div>
						

						<form th:action="@{/logout}" method="POST">
							<button type="submit" class="dropdown-item">
								<i class="fas fa-sign-out-alt" style="vertical-align: middle;"></i>
								Logout
							</button>
						</form>
					</div></li>
			</div>
			
			
			
			<div sec:authorize="isAnonymous()">
			
				<a class="btn btn-primary" th:href="@{/showLoginPage}"> 
					<i class="fas fa-sign-in-alt" style="vertical-align: middle;"></i>
					Sign In
				</a>
				&ensp;

				<a class="btn btn-warning" th:href="@{/register/user/showRegistrationForm}"> 
					<i class="fas fa-sign-in-alt" style="vertical-align: middle;"></i>
					Register Now
				</a>
			</div>


		</ul>


	</div>

</body>
</html>
